<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>체크박스 예제</title>
</head>
<body>
    <h1>관심 분야 선택</h1>
    <form action="/submit" method="POST">
        <p>관심 분야를 선택하세요:</p>
        <label>
            <input type="checkbox" name="interest" value="sports"> 스포츠
        </label><br>
        <label>
            <input type="checkbox" name="interest" value="music"> 음악
        </label><br>
        <label>
            <input type="checkbox" name="interest" value="books"> 독서
        </label><br>
        <label>
            <input type="checkbox" name="interest" value="travel"> 여행
        </label><br>
        <input type="submit" value="제출">
    </form>
</body>
</html>
